name: Build & Push

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/Prueba:latest
      - name: Levantar contenedor
        run: |
          docker rm -f prueba
          if ($LASTEXITCODE -ne 0) { 
              Write-Host "Contenedor no existía, continuamos..." 
          }
          docker run -d --name prueba -p 8888:80 ${{ vars.DOCKERHUB_USERNAME }}/Prueba:latest
